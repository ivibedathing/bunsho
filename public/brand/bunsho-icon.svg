             Q 572,448 550,474
             Q 466,592 356,704
             Q 336,726 320,734
             Q 332,712 350,684
             Q 452,560 526,448
             Q 542,428 566,430 Z"/>

    <!-- 右払い : right-falling sweep, thin start, swelling body, broad flat foot (捺) at bottom-right -->
    <path d="M 466,430
             Q 480,426 496,446
             Q 596,586 664,682
             Q 686,700 710,704
             Q 704,724 682,724
             Q 654,716 630,694
             Q 548,592 452,462
             Q 452,436 466,430 Z"/>
