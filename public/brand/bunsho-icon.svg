  <!-- 文 in a brushed, calligraphic (毛筆 / kaisho) style: filled strokes with
       tapered sweeps, brush entries, and triangular stroke-endings (uroko). -->
  <g filter="url(#inkGlow)" fill="url(#ink)">
    <!-- 点 : top dot, a short slanting brush dab -->
    <path d="M 514,290
             Q 526,300 519,322
             Q 508,350 482,360
             Q 493,340 495,314
             Q 500,296 514,290 Z"/>

    <!-- 横画 : horizontal, brush entry at left, swept body, triangular foot (uroko) at right -->
