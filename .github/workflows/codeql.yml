name: CodeQL

# Static analysis (SAST). Scans the TypeScript/JavaScript sources on push, PR,
# and weekly so newly-published queries reach existing code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "24 5 * * 1" # Mondays, 05:24 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # No build step: CodeQL analyses JS/TS from source. next build is already
      # covered by the CI workflow, so building again here would only add time.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          category: "/language:${{ matrix.language }}"
