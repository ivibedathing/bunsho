version: 2

updates:
  # Application dependencies. Grouped so a week of patch bumps arrives as one
  # PR rather than twenty.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    ignore:
      # TypeScript 7 is the native port and ships no JS compiler API — the
      # package's "." export resolves to lib/version.cjs, so `ts.readConfigFile`
      # is gone. Next reads `compilerOptions.paths` through that API, so under 7
      # every `@/*` import fails to resolve and `next build` dies. `tsc` itself
      # is fine (it shells out to the native binary), which is why only the
      # build breaks. Revisit once Next supports the native port.
      - dependency-name: typescript
        update-types: [version-update:semver-major]
    groups:
      prod-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
      dev-minor-patch:
        dependency-type: development
        update-types: [minor, patch]

  # Keeps the SHA pins in .github/workflows fresh — without this, pinning by
  # hash just means silently running stale actions forever.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    groups:
      actions:
        patterns: ["*"]

  # Base images in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
