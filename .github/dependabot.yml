version: 2

updates:
  # Application dependencies. Grouped so a week of patch bumps arrives as one
  # PR rather than twenty.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      prod-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
      dev-minor-patch:
        dependency-type: development
        update-types: [minor, patch]

  # Keeps the SHA pins in .github/workflows fresh — without this, pinning by
  # hash just means silently running stale actions forever.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    groups:
      actions:
        patterns: ["*"]

  # Base images in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
